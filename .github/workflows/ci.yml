name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Builds the shared workspace package + each service's TypeScript.
  # Catches type errors and broken imports before Render ever sees the code.
  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, restaurant, utils, realtime, rider, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Build ${{ matrix.service }}
        run: npm run build --workspace=services/${{ matrix.service }}

  # Validates each service's Dockerfile actually builds with the root
  # context, since you found this breaks silently if context is wrong.
  docker-build-check:
    runs-on: ubuntu-latest
    needs: build-services
    strategy:
      matrix:
        service: [auth, restaurant, utils, realtime, rider, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t ordersync-${{ matrix.service }}:ci \
            .

  # Frontend build check (Vite + TypeScript)
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm install
      - run: npm run build

